body{

header{

    display:flex;

.about{

    line-height:1.8;
}

.grid{

    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:25px;
}

.card{

    background:white;
    border-radius:12px;
    padding:40px;
    min-height:220px;

    display:flex;
    justify-content:center;
    align-items:center;

    transition:.3s;
}

.card:hover{

    transform:translateY(-8px);

    box-shadow:0 20px 40px rgba(0,0,0,.12);

footer{
